<body class="selection:bg-[#c5a059] selection:text-[#050f1d]">

                    </header>

                    {/* Influencers Section */}
                    <section className="pb-20 pt-0 px-6 relative z-10">
                        <div className="max-w-6xl mx-auto">
                            <InfluencerCard 
                                name="فارس التركي"
                                title="مستثمر ورائد أعمال"
                                image="./public/images/fares.jpg"
                                role="المؤثر الأول"
                                reason="تم اختيار فارس التركي لهذه التغطية كونه من الأسماء المعروفة وغطى وجهة مسار مكة سابقاً، ولديه اطلاع واسع على المنطقة ومشاريعها، مما يجعله قادرًا على نقل صورة واضحة وموثوقة عن المشروع للمشاهدين. كما يأتي توقيت هذه التغطية في وقت مناسب، نظرًا لتواجد عدد كبير من المهتمين بالشراء حاليًا في مكة المكرمة، سواء من المستثمرين أو الباحثين عن سكن بالقرب من الحرم. لذلك تعد هذه فرصة مناسبة للتعرف على المشروع عن قرب، وزيارة الموقع والاطلاع على تفاصيله بشكل مباشر."
                                pillars={[
                                    "القرب من الحرم: المشروع يبعد 850 متر فقط عن الحرم.",
                                    "ندرة الموقع: في منطقة مسار الحرم يوجد فقط 4 أبراج سكنية، وبرج جوار يملك برجين منها، وهذا هو أول برج يتم طرحه.",

                                script={`(يتم تصوير البداية داخل الحرم أو بلقطات تدمج الحرم مع وجهة مسار)

نحن الآن في المسجد الحرام، المكان الذي تتجه إليه القلوب من كل أنحاء العالم.
لكن كثير من الناس ممكن ما يعرف أن المنطقة المحيطة بالحرم اليوم تشهد أحد أكبر مشاريع التطوير الحضرية في قلب مكة المكرمة، وهو وجهة مسار.

مسار مو مجرد مشروع عادي، بل أسلوب حياة متكامل ينساب بين الحداثة والسكينة.
تخيل وجهة تضم بوليفارد مخصص للمشاة، محاطة بـ فنادق عالمية، مراكز تسوق راقية، مساحات خضراء، وبنية تحتية رقمية متقدمة مع شبكة نقل ذكية ومحطات مترو، لتصنع تجربة حضرية جديدة ومختلفة في قلب العاصمة المقدسة.

ومن بين المشاريع السكنية القليلة جدًا داخل هذه الوجهة، نوصل إلى جوهرة هذا المكان، وهو برج جوار.

-

تخيل أن تسكن على بعد 850 متر تقريبًا فقط من الحرم، في موقع استثنائي يجمع بين القرب والندرة وجودة الحياة.

ويتميز جوار بموقع استراتيجي مع مدخلين مباشرين:
مدخل من مسار مكة، ومدخل آخر من طريق الملك عبدالعزيز، مما يمنحك سهولة الوصول والتنقل سواء داخل مكة أو لوجهة مسار.
كما يبعد برج جوار حوالي 100 متر فقط عن محطة قطار الحرمين، مما يعزز من قيمة الموقع وسهولة التنقل.

-

وهذا المشروع الاستثنائي من تطوير رِكان للتطوير العقاري، وهي شركة رائدة تمتلك سنوات طويلة من الخبرة في تطوير المشاريع النوعية.
وعشان تعرف حجم الموثوقية، طورت رِكان مساحات تطويرية تتجاوز 671 ألف متر مربع، ونفذت أكثر من 4,790 وحدة سكنية وفندقية.

ومع هذه الخبرة القوية، تم اختيار مصمم عالمي للتصميم الداخلي، ليقدم مزيج من الفخامة والراحة في أدق التفاصيل.
(هنا يتم عرض صور التصميم الداخلي والمساحات)

إضافة إلى مجموعة متكاملة من المرافق المصممة لأسلوب حياة راقٍ، مثل:
• نادي رجالي
• نادي نسائي
• مسبح
• مناطق ضيافة
• لوبيات استقبال فاخرة

كل هذا يجعل جوار خيار سكني واستثماري استثنائي بالقرب من الحرم.
وإذا حاب تتعرف على المشروع بشكل أكبر، تقدر تسجل اهتمامك الآن عبر الرابط.`}
                            />

                            <InfluencerCard 
                                name="مهند الحسون"
                                title="صانع محتوى - جودة الحياة والتجارب الاستثنائية"
                                image="./public/images/muhannad.png"
                                role="المؤثر الثاني"
                                reverse={true}
                                reason="تم اختيار مهند الحسون لهذه التغطية كونه من صُنّاع المحتوى المعروفين باهتمامهم بـ جودة الحياة والتجارب الاستثنائية، ويقدم محتوى يستعرض المشاريع النوعية والمميزة التي تعكس مستوى عالٍ من الإتقان والتفرد. كما أن جمهوره يهتم بالمواقع الاستراتيجية والمنتجات العقارية التي تجمع بين القيمة العالية، الاهتمام بالتفاصيل، وجودة السكن، وهو ما يتقاطع بشكل كبير مع هوية برج جوار وموقعه الاستثنائي بالقرب من الحرم. إضافة إلى ذلك، يأتي توقيت هذه التغطية في وقت مناسب، نظرًا لتواجد عدد كبير من المهتمين بالشراء حاليًا في مكة المكرمة، سواء من المستثمرين أو الباحثين عن سكن نوعي بالقرب من الحرم. لذلك تعد هذه فرصة مناسبة للتعرف على المشروع عن قرب، وزيارة الموقع والاطلاع على تفاصيله بشكل مباشر."

كثير منا يتابع التطور العظيم اللي قاعد يصير في مكة، لكن اليوم أنا بنقلكم لقلب هذا التطور
 لأحد أكبر المشاريع الحضرية اللي بتغير مفهوم السكن والتنقل في العاصمة المقدسة: وجهة مسار.

مسار مو مجرد مشروع عادي.
هو "أسلوب حياة" يجمع بين روحانية مكة وحداثة المستقبل. تخيل وجهة كاملة فيها بوليفارد مخصص للمشاة، فنادق عالمية، مراكز تسوق راقية، وشبكة نقل ذكية ومحطات مترو.. بيئة مصممة عشان تعطيك أعلى معايير جودة الحياة.

ومن بين المشاريع السكنية القليلة جداً داخل هذه الوجهة، أخذتكم اليوم لجوهرة هذا المكان: برج جوار.

موقع البرج استراتيجي بشكل يريحك من الزحمة في مكة عندك مدخلين مباشرين: مدخل من مسار مكة، ومدخل من طريق الملك عبدالعزيز، يعني سهولة تامة في الدخول والخروج. وفوق هذا كله، محطة قطار الحرمين تبعد عنك 100 متر فقط!

طبعاً مشروع بهذه الفخامة لازم يكون وراه مطور قوي، وهنا نتكلم عن شركة رِكان للتطوير العقاري، شركة لها بصمات ضخمة بمساحات تتجاوز 671 ألف متر مربع، ونفذت أكثر من 4,790 وحدة سكنية وفندقية.
يعني أنت تسكن وأنت مرتاح وواثق من جودة التنفيذ.

ولأنهم مهتمين بأدق التفاصيل، التصميم الداخلي كان من توقيع مصمم عالمي عشان يعيشك في مساحات تدمج بين الفخامة والراحة.

اللي يبحث عن السكن الفاخر، والندرة، والقرب من الحرم في مشروع ما يتكرر.. جوار هو الخيار.
